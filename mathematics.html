<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Input Styles */
        .controls {
            margin-bottom: 40px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            width: 350px;
            outline: none;
        }

        button {
            background: #fff;
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background: #ccc; }

        /* The Frame (The "Hardware") */
        .device-frame {
            position: relative;
            width: 85vw;
            max-width: 950px;
            aspect-ratio: 16 / 9;
            background: #121212;
            padding: 18px;
            border-radius: 48px; /* Extra round like your image */
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .screen-well {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: inset 0 8px 20px rgba(0,0,0,0.8);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Zoom slightly to prevent white lines at rounded edges */
            transform: scale(1.02); 
        }

        /* Small LED detail */
        .led {
            position: absolute;
            bottom: 25px;
            right: 50px;
            width: 6px;
            height: 6px;
            background: #222;
            border-radius: 50%;
        }
        .led.on { background: #00ff41; box-shadow: 0 0 10px #00ff41; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="urlInput" placeholder="Paste YouTube Link or ID...">
        <button onclick="loadEmbed()">LOAD</button>
    </div>

    <div class="device-frame">
        <div class="screen-well">
            <iframe id="video-frame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div id="led" class="led"></div>
    </div>

    <script>
        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : url.trim();
        }

        function loadEmbed() {
            const input = document.getElementById('urlInput').value;
            const id = extractVideoID(input);
            const iframe = document.getElementById('video-frame');
            const led = document.getElementById('led');

            if (id.length === 11) {
                // The Cleanest Embed URL possible
                iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;
                led.classList.add('on');
            } else {
                alert("Please enter a valid Video ID or URL");
            }
        }
    </script>
</body>
</html>
